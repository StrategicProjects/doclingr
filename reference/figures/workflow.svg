<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0B2239" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="380" fill="#F8FAFC"/>

  <!-- title -->
  <text x="24" y="44" font-size="27" font-weight="800" fill="#0B2239">How doclingr works</text>
  <text x="24" y="72" font-size="17" font-weight="500" fill="#64748B">From a messy document to a RAG-ready corpus &#8212; one tidy pipeline.</text>

  <!-- arrows between cards (left-to-right flow) -->
  <g fill="#94A3B8">
    <path transform="translate(219,190)" d="M0 6 h17 v-6 l16 12 -16 12 v-6 h-17 Z"/>
    <path transform="translate(462,190)" d="M0 6 h17 v-6 l16 12 -16 12 v-6 h-17 Z"/>
    <path transform="translate(705,190)" d="M0 6 h17 v-6 l16 12 -16 12 v-6 h-17 Z"/>
    <path transform="translate(948,190)" d="M0 6 h17 v-6 l16 12 -16 12 v-6 h-17 Z"/>
  </g>

  <!-- ============ CARD 1: INPUT (teal) ============ -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="110" width="180" height="192" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <path d="M24 126 a16 16 0 0 1 16 -16 h148 a16 16 0 0 1 16 16 v28 h-180 Z" fill="#19C3B2"/>
  </g>
  <text x="114" y="139" text-anchor="middle" font-size="16" font-weight="800" letter-spacing="1" fill="#FFFFFF">INPUT</text>
  <!-- doc icon -->
  <g transform="translate(98,166)">
    <path d="M0 0 h22 l8 8 v30 a3 3 0 0 1 -3 3 h-27 a3 3 0 0 1 -3 -3 V3 a3 3 0 0 1 3 -3 Z" fill="none" stroke="#0F766E" stroke-width="3"/>
    <line x1="6" y1="18" x2="24" y2="18" stroke="#0F766E" stroke-width="3"/>
    <line x1="6" y1="27" x2="24" y2="27" stroke="#0F766E" stroke-width="3"/>
  </g>
  <text x="114" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">PDF · DOCX · PPTX</text>
  <text x="114" y="264" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">HTML · images</text>
  <rect x="40" y="276" width="148" height="20" rx="10" fill="#ECFDF9"/>
  <text x="114" y="290" text-anchor="middle" font-size="12.5" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#0F766E">file path / URL</text>

  <!-- ============ CARD 2: CONVERT (blue) ============ -->
  <g filter="url(#cardShadow)">
    <rect x="267" y="110" width="180" height="192" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <path d="M267 126 a16 16 0 0 1 16 -16 h148 a16 16 0 0 1 16 16 v28 h-180 Z" fill="#3B82F6"/>
  </g>
  <text x="357" y="139" text-anchor="middle" font-size="16" font-weight="800" letter-spacing="1" fill="#FFFFFF">CONVERT</text>
  <!-- gear icon -->
  <g transform="translate(343,168)" stroke="#1D4ED8" stroke-width="3" fill="none">
    <circle cx="14" cy="16" r="9"/>
    <circle cx="14" cy="16" r="3" fill="#1D4ED8"/>
    <line x1="14" y1="2" x2="14" y2="7"/><line x1="14" y1="25" x2="14" y2="30"/>
    <line x1="0" y1="16" x2="5" y2="16"/><line x1="23" y1="16" x2="28" y2="16"/>
  </g>
  <text x="357" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">layout · OCR</text>
  <text x="357" y="264" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">table structure</text>
  <rect x="283" y="276" width="148" height="20" rx="10" fill="#EFF6FF"/>
  <text x="357" y="290" text-anchor="middle" font-size="12.5" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#1D4ED8">docling_convert()</text>

  <!-- ============ CARD 3: EXTRACT (indigo) ============ -->
  <g filter="url(#cardShadow)">
    <rect x="510" y="110" width="180" height="192" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <path d="M510 126 a16 16 0 0 1 16 -16 h148 a16 16 0 0 1 16 16 v28 h-180 Z" fill="#6366F1"/>
  </g>
  <text x="600" y="139" text-anchor="middle" font-size="16" font-weight="800" letter-spacing="1" fill="#FFFFFF">EXTRACT</text>
  <!-- grid/table icon -->
  <g transform="translate(584,168)" stroke="#4338CA" stroke-width="3" fill="none">
    <rect x="0" y="2" width="32" height="28" rx="3"/>
    <line x1="0" y1="13" x2="32" y2="13"/><line x1="16" y1="2" x2="16" y2="30"/>
  </g>
  <text x="600" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Markdown · JSON</text>
  <text x="600" y="264" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">tables · figures</text>
  <rect x="526" y="276" width="148" height="20" rx="10" fill="#EEF2FF"/>
  <text x="600" y="290" text-anchor="middle" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#4338CA">docling_tables() · …</text>

  <!-- ============ CARD 4: CHUNK (violet) ============ -->
  <g filter="url(#cardShadow)">
    <rect x="753" y="110" width="180" height="192" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <path d="M753 126 a16 16 0 0 1 16 -16 h148 a16 16 0 0 1 16 16 v28 h-180 Z" fill="#8B5CF6"/>
  </g>
  <text x="843" y="139" text-anchor="middle" font-size="16" font-weight="800" letter-spacing="1" fill="#FFFFFF">CHUNK</text>
  <!-- stacked bars icon -->
  <g transform="translate(827,168)" fill="#6D28D9">
    <rect x="0" y="2" width="32" height="7" rx="3"/>
    <rect x="0" y="13" width="24" height="7" rx="3"/>
    <rect x="0" y="24" width="30" height="7" rx="3"/>
  </g>
  <text x="843" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">context-rich,</text>
  <text x="843" y="264" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">token-aware tibble</text>
  <rect x="769" y="276" width="148" height="20" rx="10" fill="#F5F3FF"/>
  <text x="843" y="290" text-anchor="middle" font-size="12.5" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#6D28D9">docling_chunk()</text>

  <!-- ============ CARD 5: EMBED (amber) ============ -->
  <g filter="url(#cardShadow)">
    <rect x="996" y="110" width="180" height="192" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <path d="M996 126 a16 16 0 0 1 16 -16 h148 a16 16 0 0 1 16 16 v28 h-180 Z" fill="#F59E0B"/>
  </g>
  <text x="1086" y="139" text-anchor="middle" font-size="16" font-weight="800" letter-spacing="1" fill="#FFFFFF">EMBED → RAG</text>
  <!-- vector dots icon -->
  <g transform="translate(1068,180)">
    <line x1="2" y1="6" x2="42" y2="6" stroke="#B45309" stroke-width="3"/>
    <circle cx="2" cy="6" r="6" fill="#F59E0B"/>
    <circle cx="22" cy="6" r="6" fill="#3B82F6"/>
    <circle cx="42" cy="6" r="6" fill="#19C3B2"/>
  </g>
  <text x="1086" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">embeddings →</text>
  <text x="1086" y="264" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">vector store</text>
  <rect x="1012" y="276" width="148" height="20" rx="10" fill="#FEF3C7"/>
  <text x="1086" y="290" text-anchor="middle" font-size="12.5" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#B45309">docling_embed()</text>

  <!-- footer -->
  <text x="600" y="352" text-anchor="middle" font-size="14" font-weight="500" fill="#94A3B8">
    Powered by the Docling Python engine via reticulate &#8212; layout, table and OCR models with no R-native equivalent.
  </text>
</svg>
