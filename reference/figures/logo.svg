<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 600" width="520" height="600" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#143251"/>
      <stop offset="1" stop-color="#0B2239"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19C3B2"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- hex body -->
  <path d="M260 9 L512 154.5 L512 445.5 L260 591 L8 445.5 L8 154.5 Z"
        fill="url(#hex)" stroke="url(#rim)" stroke-width="16" stroke-linejoin="round"/>

  <!-- document (messy input) -->
  <g filter="url(#soft)">
    <path d="M104 168 H214 L246 200 V362 a14 14 0 0 1 -14 14 H104 a14 14 0 0 1 -14 -14 V182 a14 14 0 0 1 14 -14 Z"
          fill="#FFFFFF"/>
    <path d="M214 168 L246 200 H222 a8 8 0 0 1 -8 -8 Z" fill="#CBD5E1"/>
  </g>
  <rect x="110" y="214" width="92" height="14" rx="7" fill="#19C3B2"/>
  <rect x="110" y="242" width="116" height="9" rx="4.5" fill="#CBD5E1"/>
  <rect x="110" y="262" width="116" height="9" rx="4.5" fill="#CBD5E1"/>
  <rect x="110" y="282" width="84" height="9" rx="4.5" fill="#CBD5E1"/>
  <!-- mini table -->
  <rect x="110" y="306" width="116" height="46" rx="6" fill="none" stroke="#CBD5E1" stroke-width="3"/>
  <line x1="110" y1="324" x2="226" y2="324" stroke="#CBD5E1" stroke-width="3"/>
  <line x1="168" y1="306" x2="168" y2="352" stroke="#CBD5E1" stroke-width="3"/>

  <!-- transform arrow -->
  <path d="M256 268 h28 v-14 l26 24 -26 24 v-14 h-28 Z" fill="#FBBF24"/>

  <!-- structured output: chunks grid -->
  <g>
    <rect x="318" y="196" width="40" height="40" rx="9" fill="#19C3B2"/>
    <rect x="366" y="196" width="40" height="40" rx="9" fill="#3B82F6"/>
    <rect x="318" y="244" width="40" height="40" rx="9" fill="#3B82F6"/>
    <rect x="366" y="244" width="40" height="40" rx="9" fill="#FBBF24"/>
    <rect x="318" y="292" width="40" height="40" rx="9" fill="#FBBF24"/>
    <rect x="366" y="292" width="40" height="40" rx="9" fill="#19C3B2"/>
    <!-- embedding vector dots -->
    <line x1="328" y1="356" x2="404" y2="356" stroke="#5B7A99" stroke-width="3"/>
    <circle cx="328" cy="356" r="7" fill="#19C3B2"/>
    <circle cx="366" cy="356" r="7" fill="#3B82F6"/>
    <circle cx="404" cy="356" r="7" fill="#FBBF24"/>
  </g>

  <!-- wordmark -->
  <text x="260" y="468" text-anchor="middle" font-size="74" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">docling</tspan><tspan fill="#19C3B2">r</tspan>
  </text>
  <text x="260" y="506" text-anchor="middle" font-size="20" font-weight="600"
        letter-spacing="2" fill="#8FA6BE">documents &#8594; AI-ready data</text>
</svg>
